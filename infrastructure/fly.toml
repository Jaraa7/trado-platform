# TRADO fly.toml
app = 'trado-bot'
primary_region = 'sin'

[build]
  dockerfile = 'infrastructure/Dockerfile'

[env]
  PORT = '8000'
  ENVIRONMENT = 'production'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
