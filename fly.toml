# TRADO - Fly.io Configuration
# Primary: Singapore

app = 'trado-bot'
primary_region = 'sin'

[build]
  dockerfile = 'infrastructure/Dockerfile'

[env]
  PORT = '8000'
  ENVIRONMENT = 'production'
  LOG_LEVEL = 'INFO'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    port = 8000
    timeout = '5s'
    type = 'http'